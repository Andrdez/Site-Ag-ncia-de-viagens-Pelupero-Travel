    <!-- Conteúdo -->
    <main>
        <section class="orcamento">
            <h2>Solicite seu Orçamento</h2>
            <p>Preencha os dados abaixo e nossa equipe entrará em contato.</p>

            <form>

                <div class="linha">
                    <div class="campo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required>
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="origem">Cidade de Origem</label>
                        <input type="text" id="origem" required>
                    </div>

                    <div class="campo">
                        <label for="destino">Cidade de Destino</label>
                        <input type="text" id="destino" required>
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="viajantes">Nº de Viajantes</label>
                        <input type="number" id="viajantes" min="1" required>
                    </div>

                    <div class="campo">
                        <label for="ida">Data de Ida</label>
                        <input type="date" id="ida" required>
                    </div>

                    <div class="campo">
                        <label for="volta">Data de Volta</label>
                        <input type="date" id="volta" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="obs">Observações</label>
                    <textarea id="obs" rows="5"></textarea>
                </div>

                <button type="submit">Solicitar Orçamento</button>

            </form>
        </section>
    </main>
